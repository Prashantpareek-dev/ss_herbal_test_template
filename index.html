/* Badge */
const BADGE_COLORS = {
  green:  {bg:'#E8F5EE',  color:'#1A6B3A', border:'#D1E8DB'},
  gold:   {bg:'#F5ECCF',  color:'#8A6D1E', border:'#E7D7A0'},
  danger: {bg:'#FCE8E8',  color:'#C53030', border:'#FCA5A5'},
  amber:  {bg:'#FEF3E2',  color:'#92400E', border:'#FCD34D'},
  blue:   {bg:'#E6F0FA',  color:'#1E40AF', border:'#BFDBFE'},
  purple: {bg:'#EEE8FB',  color:'#5B21B6', border:'#DDD6FE'},
  neutral:{bg:'#F1F5F9',  color:'#475569', border:'#CBD5E1'},
};
function Badge({tone='green', solid, dot, children, style={}}) {
  const c = BADGE_COLORS[tone]||BADGE_COLORS.green;
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:5,padding:'3px 10px',borderRadius:24,fontSize:12,fontWeight:700,fontFamily:'var(--font-body)',border:`1px solid ${c.border}`,background:solid?c.color:c.bg,color:solid?'#fff':c.color,...style}}>
      {dot && <span style={{width:6,height:6,borderRadius:'50%',background:solid?'rgba(255,255,255,.7)':c.color}}/>}
      {children}
    </span>
  );
}

/* Button */
const BTN_STYLES = {
  primary:   {bg:'var(--green-700)',  color:'#fff',      border:'none'},
  secondary: {bg:'transparent',       color:'var(--green-700)', border:'2px solid var(--green-700)'},
  ghost:     {bg:'transparent',       color:'var(--green-700)', border:'none'},
  gold:      {bg:'var(--gold-500)',   color:'#fff',      border:'none'},
  white:     {bg:'#fff',              color:'var(--green-700)', border:'none'},
};
const BTN_SIZES = {
  sm:{padding:'7px 16px',fontSize:13},
  md:{padding:'10px 20px',fontSize:14},
  lg:{padding:'13px 28px',fontSize:15},
};
function Btn({variant='primary',size='md',fullWidth,disabled,onClick,children,style={}}) {
  const s = BTN_STYLES[variant]||BTN_STYLES.primary;
  const z = BTN_SIZES[size]||BTN_SIZES.md;
  const [hov,setHov] = React.useState(false);
  return (
    <button onClick={onClick} disabled={disabled} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{...z,background:s.bg,color:s.color,border:s.border||'none',borderRadius:'var(--radius-button)',fontFamily:'var(--font-body)',fontWeight:700,cursor:disabled?'not-allowed':'pointer',opacity:disabled?.55:1,width:fullWidth?'100%':'auto',transition:'all .17s',transform:hov&&!disabled?'translateY(-1px)':'none',boxShadow:hov&&!disabled&&variant==='primary'?'0 4px 16px rgba(26,107,58,.25)':'none',whiteSpace:'nowrap',...style}}>
      {children}
    </button>
  );
}

/* Input */
function Inp({label,helper,error,prefix,suffix,type='text',placeholder,value,onChange,defaultValue,onKeyDown,style={}}) {
  return (
    <div style={{display:'flex',flexDirection:'column',gap:5,...style}}>
      {label && <label style={{fontSize:13,fontWeight:600,color:'var(--ink-900)',fontFamily:'var(--font-body)'}}>{label}</label>}
      <div style={{display:'flex',alignItems:'center',border:`1px solid ${error?'var(--danger-500)':'#CBD5DF'}`,borderRadius:'var(--radius-input)',overflow:'hidden',background:'#fff'}}>
        {prefix && <div style={{padding:'0 10px',color:'var(--ink-400)',borderRight:'1px solid #E8EDF2',background:'#F9FAFB',display:'flex',alignItems:'center',height:46,fontSize:14}}>{prefix}</div>}
        <input type={type} placeholder={placeholder} value={value} defaultValue={defaultValue} onChange={onChange} onKeyDown={onKeyDown}
          style={{flex:1,border:'none',outline:'none',padding:'0 12px',height:46,fontSize:15,fontFamily:'var(--font-body)',color:'var(--ink-900)',background:'transparent'}}/>
        {suffix && <div style={{padding:'0 10px',cursor:'pointer',display:'flex',alignItems:'center',height:46}}>{suffix}</div>}
      </div>
      {error && <div style={{fontSize:12,color:'var(--danger-500)',fontFamily:'var(--font-body)'}}>{error}</div>}
      {helper && !error && <div style={{fontSize:12,color:'var(--ink-400)',fontFamily:'var(--font-body)'}}>{helper}</div>}
    </div>
  );
}

/* Stars */
function Stars({value=0,size=14,interactive=false,onChange}) {
  const [hov,setHov]=React.useState(0);
  return (
    <div style={{display:'flex',gap:1}}>

          style={{fontSize:size,color:(interactive?hov||value:value)>=s?'var(--gold-500)':'#DDE5E0',cursor:interactive?'pointer':'default',lineHeight:1}}>★</span>
      ))}
    </div>
  );
}

/* PriceTag */
function PriceTag({price,mrp,size='md'}) {
  const savings = Math.round((1-price/mrp)*100);
  const sz = size==='lg'?{price:32,old:16,badge:13}:size==='sm'?{price:16,old:12,badge:11}:{price:22,old:14,badge:12};
  return (
    <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
      <span style={{fontSize:sz.price,fontWeight:800,color:'var(--green-700)',fontFamily:'var(--font-body)'}}>₹{price.toLocaleString('en-IN')}</span>
      <span style={{fontSize:sz.old,color:'var(--ink-400)',textDecoration:'line-through',fontFamily:'var(--font-body)'}}>₹{mrp.toLocaleString('en-IN')}</span>
      <span style={{fontSize:sz.badge,fontWeight:700,background:'var(--green-50)',color:'var(--green-700)',border:'1px solid var(--green-100)',borderRadius:6,padding:'2px 7px',fontFamily:'var(--font-body)'}}>{savings}% OFF</span>
    </div>
  );
}

/* Qty Stepper */
function Qty({value,onChange,min=1,max=10}) {
  return (
    <div style={{display:'flex',alignItems:'center',border:'1.5px solid var(--green-100)',borderRadius:'var(--radius-button)',overflow:'hidden',height:44}}>
      <button onClick={()=>onChange(Math.max(min,value-1))} style={{width:44,background:'none',border:'none',cursor:'pointer',fontSize:20,color:'var(--green-700)',fontWeight:700}}>−</button>
      <span style={{minWidth:36,textAlign:'center',fontSize:16,fontWeight:700,fontFamily:'var(--font-body)',color:'var(--ink-900)'}}>{value}</span>
      <button onClick={()=>onChange(Math.min(max,value+1))} style={{width:44,background:'none',border:'none',cursor:'pointer',fontSize:20,color:'var(--green-700)',fontWeight:700}}>+</button>
    </div>
  );
}

function PCard({id,name,tagline,price,mrp,rating,reviews,badge,badgeTone,onClick,onAdd}) {
  const [hov,setHov]=React.useState(false);
  return (
    <div onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{background:'#fff',border:'1px solid var(--green-100)',borderRadius:16,overflow:'hidden',cursor:'pointer',transition:'all .22s',transform:hov?'translateY(-4px)':'none',boxShadow:hov?'var(--shadow-hover)':'var(--shadow-card)',display:'flex',flexDirection:'column'}}>
      <div style={{background:'var(--green-50)',aspectRatio:'1',display:'grid',placeItems:'center',position:'relative'}}>
        {badge && <div style={{position:'absolute',top:10,left:10}}><Badge tone={badgeTone||'green'} solid>{badge}</Badge></div>}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,opacity:.25}}>

        <div style={{fontSize:12,color:'var(--ink-400)',fontFamily:'var(--font-body)'}}>{tagline}</div>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <Stars value={rating} size={12}/><span style={{fontSize:11,color:'var(--ink-400)',fontFamily:'var(--font-body)'}}>({reviews.toLocaleString('en-IN')})</span>

        <PriceTag price={price} mrp={mrp} size="sm"/>
        <button onClick={e=>{e.stopPropagation();onAdd&&onAdd();}} style={{marginTop:'auto',padding:'9px 0',background:hov?'var(--green-700)':'var(--green-50)',color:hov?'#fff':'var(--green-700)',border:`1.5px solid ${hov?'var(--green-700)':'var(--green-100)'}`,borderRadius:8,fontFamily:'var(--font-body)',fontSize:13,fontWeight:700,cursor:'pointer',transition:'all .17s'}}>

<script type="text/babel">

<!-- ═══════════════════════════════════════════ APP ROOT ══ -->
<script type="text/babel">
function App() {
  const [page,setPage]=React.useState('home');
  const [sub,setSub]=React.useState(null);
  const [cart,setCart]=React.useState([]);
  const [user,setUser]=React.useState(null);

  const nav=(to,data)=>{
    setPage(to);
    if(data!==undefined)setSub(data);
    window.scrollTo({top:0,behavior:'smooth'});
  };
  const addToCart=(p)=>setCart(prev=>[...prev,p]);
  const removeFromCart=(i)=>setCart(prev=>prev.filter((_,idx)=>idx!==i));

  const noChrome=page==='login';

  const screen=()=>{
    switch(page){
      case 'home':         return <HomePage onNav={nav}/>;
      case 'listing':      return <ListingPage onNav={nav} onAddToCart={addToCart}/>;
      case 'new-launches': return <NewLaunchesPage onNav={nav} onAddToCart={addToCart}/>;
      case 'pdp':          return <PDPPage product={sub} onNav={nav} onAddToCart={addToCart}/>;
      case 'cart':         return <CartPage cartItems={cart} onNav={nav} onRemove={removeFromCart}/>;
      case 'checkout':     return <CheckoutPage cartItems={cart} onNav={nav}/>;
      case 'order-confirm':return <OrderConfirmPage onNav={nav}/>;
      case 'blog':         return <BlogListingPage onNav={nav}/>;
      case 'blog-article': return <BlogArticlePage post={sub} onNav={nav}/>;
      case 'health-test':  return <HealthTestPage onNav={nav}/>;
      case 'doctor-chat':  return <DoctorChatPage onNav={nav}/>;
      case 'login':        return <LoginPage onNav={nav} onLogin={(u)=>setUser(u)}/>;
      case 'account':      return <AccountPage user={user} onNav={nav} onLogout={()=>{setUser(null);nav('home');}}/>;
      case 'track-order':  return <OrderTrackingPage onNav={nav}/>;
      default:             return <HomePage onNav={nav}/>;
    }
  };

  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      {!noChrome&&<AnnBar/>}
      {!noChrome&&<Nav page={page} onNav={nav} cartCount={cart.length} user={user}/>}
      <main style={{flex:1}}>{screen()}</main>
      {!noChrome&&<Footer onNav={nav}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
